name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff>=0.8.0

      - name: Ruff lint
        run: ruff check src tests main.py

      - name: Ruff format check
        run: ruff format --check src tests main.py

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mypy>=1.13.0

      - name: mypy
        run: mypy src main.py

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        experimental: [false, false, true]

    continue-on-error: ${{ matrix.experimental }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install hypothesis>=6.100.0

      # Coverage Threshold Roadmap:
      #   Phase 9-11: 60% (baseline — locked)
      #   Phase 12:   65% (current)
      #   Phase 13:   70% — target: 2026-06-01
      #   Phase 14:   75% — target: 2026-06-15
      # Each phase must contribute test coverage improvements before bumping.
      # Update this value when the actual coverage consistently exceeds the next target.
      - name: Run tests with coverage
        run: |
          pytest \
            --cov=src \
            --cov=main \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=65 \
            --tb=short \
            -v

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit>=0.3.0

      - name: Run pip-audit
        run: pip-audit --desc
